<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Contact | St. Xavier's High School</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>

<body class="bg-gradient-to-br from-blue-50 to-purple-100">

<div id="header"></div>

<!-- HERO -->
<section class="py-20 text-center">
  <h1 class="text-4xl md:text-5xl font-bold text-gray-800">Get In Touch</h1>
  <p class="mt-4 text-gray-600">We would love to hear from you</p>
</section>


<!-- CONTACT CARDS -->
<section class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-6 mb-16">

<div class="bg-white/70 backdrop-blur-lg p-6 rounded-2xl shadow text-center">
  <i class="fa-solid fa-phone text-2xl text-blue-600"></i>
  <h3 class="font-semibold mt-3">Call Us</h3>
  <p class="text-sm text-gray-600 mt-1">+91 9692973059</p>
</div>

<div class="bg-white/70 backdrop-blur-lg p-6 rounded-2xl shadow text-center">
  <i class="fa-solid fa-envelope text-2xl text-purple-600"></i>
  <h3 class="font-semibold mt-3">Email</h3>
  <p class="text-sm text-gray-600 mt-1">stxavierphulabani@gmail.com</p>
</div>

<div class="bg-white/70 backdrop-blur-lg p-6 rounded-2xl shadow text-center">
  <i class="fa-solid fa-location-dot text-2xl text-green-600"></i>
  <h3 class="font-semibold mt-3">Visit Us</h3>
  <p class="text-sm text-gray-600 mt-1">
    Ramachandrapur, Jatni, Khurda, Odisha
  </p>
</div>

</section>


<!-- MAIN SECTION -->
<section class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-10 pb-20">

<!-- MAP -->
<div class="rounded-2xl overflow-hidden shadow-lg">
  <iframe class="w-full h-full min-h-[400px] border-0"
  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3742.3852596195993!2d85.86112867469497!3d20.284314512931928!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a190a0990bc8959%3A0xc43dfa453e53c7a8!2sPearly%20International%20School%20%26%20Daycare!5e0!3m2!1sen!2sin!4v1772873938069!5m2!1sen!2sin"
  loading="lazy"></iframe>
</div>


<!-- FORM -->
<div class="bg-white p-8 rounded-2xl shadow-xl">

<h2 class="text-2xl font-bold text-gray-800 mb-6">
Send Message
</h2>

<form class="space-y-4">

<div class="grid grid-cols-2 gap-4">
<input type="text" placeholder="First Name"
class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

<input type="text" placeholder="Last Name"
class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
</div>

<input type="email" placeholder="Email Address"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

<input type="tel" placeholder="Phone Number"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

<select class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
<option>Select Subject</option>
<option>Admission</option>
<option>General Enquiry</option>
<option>Complaint</option>
</select>

<textarea rows="4" placeholder="Write your message..."
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>

<button
class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:opacity-90">
Send Message
</button>

</form>

</div>

</section>


<!-- CTA -->
<section class="bg-blue-600 text-white py-16 text-center">
<h2 class="text-3xl font-bold mb-4">Need Quick Help?</h2>
<p class="mb-6">Our team is available to assist you anytime.</p>

<a href="tel:+919807546446"
class="bg-white text-blue-600 px-6 py-3 rounded-lg font-semibold">
Call Now
</a>
</section>


<div id="footer"></div>

<script src="js/main.js"></script>

</body>
</html>
