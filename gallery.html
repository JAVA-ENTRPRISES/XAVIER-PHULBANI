<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gallery | St. Xavier's High School</title>

    <link rel="icon" type="image/png" href="images/log.png" />

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body class="bg-gray-50">
    <div id="header"></div>

    <!-- HERO -->

    <section
      class="relative h-[320px] flex items-center justify-center text-white"
    >
      <img
        src="images/school.jpg"
        class="absolute w-full h-full object-cover"
      />

      <div class="absolute inset-0 bg-black/60"></div>

      <div class="relative text-center">
        <h1 class="text-4xl md:text-5xl font-bold">School Gallery</h1>

        <p class="mt-3 text-gray-200">
          Moments of learning, celebrations, and achievements
        </p>
      </div>
    </section>

    <!-- FILTER BUTTONS -->

    <!-- <section class="py-10 bg-white">
      <div class="max-w-7xl mx-auto px-6 text-center">
        <div class="flex flex-wrap justify-center gap-4">
          <button class="px-5 py-2 bg-blue-700 text-white rounded-full">
            All
          </button>

          <button class="px-5 py-2 bg-gray-200 rounded-full">Events</button>

          <button class="px-5 py-2 bg-gray-200 rounded-full">Sports</button>

          <button class="px-5 py-2 bg-gray-200 rounded-full">Activities</button>

          <button class="px-5 py-2 bg-gray-200 rounded-full">Campus</button>
        </div>
      </div>
    </section> -->

    <!-- GALLERY GRID -->

    <section class="py-20">
      <div class="max-w-7xl mx-auto px-6">
        <div class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
          <!-- IMAGE CARD -->

          <div class="relative group overflow-hidden rounded-xl shadow">
            <img
              src="images/annual.jpg"
              class="w-full h-60 object-cover group-hover:scale-110 transition duration-500"
            />

            <div
              class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition"
            ></div>

            <div
              class="absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="font-semibold">Annual Day</h3>
            </div>
          </div>

          <div class="relative group overflow-hidden rounded-xl shadow">
            <img
              src="images/sport.webp"
              class="w-full h-60 object-cover group-hover:scale-110 transition duration-500"
            />

            <div
              class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition"
            ></div>

            <div
              class="absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="font-semibold">Sports Day</h3>
            </div>
          </div>

          <div class="relative group overflow-hidden rounded-xl shadow">
            <img
              src="images/science.jpg"
              class="w-full h-60 object-cover group-hover:scale-110 transition duration-500"
            />

            <div
              class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition"
            ></div>

            <div
              class="absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="font-semibold">Science Exhibition</h3>
            </div>
          </div>

          <div class="relative group overflow-hidden rounded-xl shadow">
            <img
              src="images/act.jpg"
              class="w-full h-60 object-cover group-hover:scale-110 transition duration-500"
            />

            <div
              class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition"
            ></div>

            <div
              class="absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="font-semibold">Classroom Activities</h3>
            </div>
          </div>

          <div class="relative group overflow-hidden rounded-xl shadow">
            <img
              src="images/cul.jpg"
              class="w-full h-60 object-cover group-hover:scale-110 transition duration-500"
            />

            <div
              class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition"
            ></div>

            <div
              class="absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="font-semibold">Cultural Program</h3>
            </div>
          </div>

          <div class="relative group overflow-hidden rounded-xl shadow">
            <img
              src="images/assembly.jpg"
              class="w-full h-60 object-cover group-hover:scale-110 transition duration-500"
            />

            <div
              class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition"
            ></div>

            <div
              class="absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="font-semibold">Morning Assembly</h3>
            </div>
          </div>

          <div class="relative group overflow-hidden rounded-xl shadow">
            <img
              src="images/teacher.jpg"
              class="w-full h-60 object-cover group-hover:scale-110 transition duration-500"
            />

            <div
              class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition"
            ></div>

            <div
              class="absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="font-semibold">Teacher's Day</h3>
            </div>
          </div>

          <div class="relative group overflow-hidden rounded-xl shadow">
            <img
              src="images/tree.jpg"
              class="w-full h-60 object-cover group-hover:scale-110 transition duration-500"
            />

            <div
              class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition"
            ></div>

            <div
              class="absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="font-semibold">Plantation Drive</h3>
            </div>
          </div>
        </div>

        <!-- LOAD MORE BUTTON -->

        <!-- <div class="text-center mt-14">
          <button
            class="px-8 py-3 bg-blue-700 text-white rounded-lg font-semibold hover:bg-blue-800"
          >
            Load More Photos
          </button>
        </div> -->
      </div>
    </section>

    <div id="footer"></div>

    <script src="js/main.js"></script>
  </body>
</html>
