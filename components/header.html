<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Header 2</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

      /* Hover underline animation */
      .nav-link {
        position: relative;
      }

      .nav-link::after {
        content: "";
        position: absolute;
        width: 0%;
        height: 2px;
        background: #07286d;
        left: 50%;
        bottom: -5px;
        transition: 0.3s;
        transform: translateX(-50%);
      }

      .nav-link:hover::after {
        width: 100%;
      }
      .nav-link.active {
        color: #07286d;
        font-weight: 700;
      }
      .nav-link.active::after {
        width: 100%;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- HEADER -->
    <header class="sticky top-0 z-50 shadow-md">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <!-- LEFT LOGO -->
        <div class="flex items-center gap-3">
          <img src="images/logox2.png" class="h-12 w-46" />
          <!-- <h1 class="text-lg font-bold text-blue-900">ST XAVIER SCHOOL</h1> -->
        </div>

        <!-- CENTER NAV -->
        <nav class="hidden lg:flex gap-8 font-medium text-gray-800">
          <a href="index.html" class="nav-link hover:text-blue-600">Home</a>
          <a href="about.html" class="nav-link hover:text-blue-600">About</a>
          <a href="academic.html" class="nav-link hover:text-blue-600">Academics</a>
          <a href="admission.html" class="nav-link hover:text-blue-600">Admissions</a>
          <a href="mandatory-disclosure.html" class="nav-link hover:text-blue-600">Mandatory Disclosure</a>
          <a href="gallery.html" class="nav-link hover:text-blue-600">Gallery</a>
          <a href="contact.html" class="nav-link hover:text-blue-600">Contact</a>
        </nav>

        <!-- RIGHT BUTTON -->
        <div class="hidden lg:flex items-center gap-4">
          <a href="#" class="text-blue-700 font-semibold">Login</a>

          <a
            href="#"
            class="bg-blue-600 text-white px-5 py-2 rounded-full shadow hover:bg-blue-700 transition"
          >
            Enroll Now
          </a>
        </div>

       <!-- Mobile Button -->
        <button onclick="openMenu()" class="md:hidden text-2xl">☰</button>
      </div>

      <!-- Mobile Menu -->
      <div
        id="mobileMenu"
        class="fixed top-0 right-0 h-100 w-64 bg-gray-200 p-6 transform translate-x-full transition duration-300 z-50"
      >
        <div
          class="text-right text-3xl cursor-pointer mb-6"
          onclick="closeMenu()"
        >
          ×
        </div>
        <nav class="flex flex-col gap-6 text-lg font-medium">
          <a href="index.html" onclick="closeMenu()">Home</a>
          <a href="about.html" onclick="closeMenu()">About</a>
          <a href="admission.html" onclick="closeMenu()">Admission</a>
          <a href="academic.html" onclick="closeMenu()">Academic</a>
          <a href="facility.html" onclick="closeMenu()">Facility</a>
          <a href="mandatory-disclosure.html" onclick="closeMenu()"
            >Mandatory Disclosure</a
          >
          <a href="gallery.html" onclick="closeMenu()">Gallery</a>
          <a href="contact.html" onclick="closeMenu()">Contact</a>
          <a
            href="#"
            class="bg-blue-600 text-white px-5 py-2 rounded-full shadow hover:bg-blue-700 transition"
          >
            Enroll Now
          </a>
        </nav>
      </div>

      <!-- Overlay -->
      <div
        id="overlay"
        class="fixed inset-0 bg-black/40 hidden"
        onclick="closeMenu()"
      ></div>
    </header>

    
  </body>
</html>
