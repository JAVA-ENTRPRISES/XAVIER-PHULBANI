<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Footer 2</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body>
    <!-- FOOTER -->
    <footer class="bg-[#020617] text-gray-300 pt-20 relative">
      <!-- WAVE DESIGN -->
      <div
        class="absolute top-0 left-0 w-full overflow-hidden leading-none rotate-180"
      >
        <svg
          class="relative block w-full h-16"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 1200 120"
          preserveAspectRatio="none"
        >
          <path
            d="M985.66,92.83C906.67,72,823.78,31,743.84,14.19c-82.26-17.34-168.18-3.38-250.45,16.14C412.28,51.7,332.3,80.41,250.5,84.2,168.74,87.99,86.42,66.86,0,43.77V0H1200V27.35C1113.48,56.46,1042.65,107.67,985.66,92.83Z"
            fill="#1E3A8A"
          ></path>
        </svg>
      </div>

      <div
        class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 lg:grid-cols-4 gap-10"
      >
        <!-- ABOUT -->
        <div class="bg-white/5 p-6 rounded-xl shadow-lg">
          <!-- <img src="images/holy.jpg" class="h-14 mb-4 rounded-full" /> -->

          <h2 class="text-white text-lg font-semibold mb-3">
            St Xavier School
          </h2>

          <p class="text-sm">
            Building future leaders with knowledge, discipline, and innovation
            in a modern learning environment.
          </p>
        </div>

        <!-- LINKS -->
        <div class="bg-white/5 p-6 rounded-xl shadow-lg">
          <h3 class="text-white text-lg font-semibold mb-4">Useful Links</h3>

          <ul class="space-y-2 text-sm">
            <li><a href="#" class="hover:text-blue-400">Home</a></li>
            <li><a href="#" class="hover:text-blue-400">About</a></li>
            <li><a href="#" class="hover:text-blue-400">Academics</a></li>
            <li><a href="#" class="hover:text-blue-400">Admissions</a></li>
            <li><a href="#" class="hover:text-blue-400">Contact</a></li>
          </ul>
        </div>

        <!-- CONTACT -->
        <div class="bg-white/5 p-6 rounded-xl shadow-lg">
          <h3 class="text-white text-lg font-semibold mb-4">Contact</h3>

          <p class="text-sm mb-2">
            <i class="fa fa-location-dot text-blue-400 mr-2"></i>
            Phulbani, Odisha
          </p>

          <p class="text-sm mb-2">
            <i class="fa fa-phone text-blue-400 mr-2"></i>
            +91 9876543210
          </p>

          <p class="text-sm">
            <i class="fa fa-envelope text-blue-400 mr-2"></i>
            school@email.com
          </p>
        </div>

        <!-- SOCIAL -->
        <div class="bg-white/5 p-6 rounded-xl shadow-lg">
          <h3 class="text-white text-lg font-semibold mb-4">Follow Us</h3>

          <div class="flex gap-4 text-xl">
            <a href="#" class="hover:text-blue-400"
              ><i class="fab fa-facebook"></i
            ></a>
            <a href="#" class="hover:text-pink-400"
              ><i class="fab fa-instagram"></i
            ></a>
            <a href="#" class="hover:text-red-400"
              ><i class="fab fa-youtube"></i
            ></a>
            <a href="#" class="hover:text-sky-400"
              ><i class="fab fa-twitter"></i
            ></a>
          </div>

          <div class="mt-6">
            <input
              type="email"
              placeholder="Your Email"
              class="w-full px-3 py-2 rounded bg-gray-800 text-sm outline-none"
            />

            <button
              class="w-full mt-3 bg-blue-600 py-2 rounded hover:bg-blue-700"
            >
              Subscribe
            </button>
          </div>
        </div>
      </div>

      <!-- BOTTOM -->
      <div class="mt-14 border-t border-white/10 text-center py-4 text-sm">
        © 2026 St Xavier School
      </div>
    </footer>
  </body>
</html>
